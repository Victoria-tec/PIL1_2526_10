<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" type="module"></script>
    <title>IFRI MentorLink</title>
</head>
<body style="background-color: rgb(223, 223, 223);">
    <div style="background-image: url(../static/images/mentoring.jpg); background-size: 100% 100%; background-repeat: no-repeat; min-height: 500px;">
        <page-header variante="accueil"></page-header>
        <div class="presentation-block">
            <h1>IFRI MentorLink</h1>
            <h3 style="font-style: italic; font-weight: 500;">La plateforme de mentorat académique et professionnel des étudiants de l'IFRI</h3>
            <h2>Trouvez un mentor dans votre domaine ou partagez vos compétences avec vos pairs</h2>
            <button class="blue-button" style="background-color: var(--bleu)"><a href="gestion_comptes/inscription.html">Commencez l'aventure</a></button>
        </div>
    </div>

    <page-block titre = "Qui sommes-nous ?" 
    texte = "IFRI MentorLink met en relation les étudiants de l'Institut de Formation et de Recherche en Informatique qui souhaitent progresser avec ceux qui peuvent les accompagner. Chaque étudiant crée un profil détaillant ses compétences, ses lacunes et ses disponibilités. La plateforme analyse ces informations pour proposer les correspondances les plus pertinentes entre mentors et mentorés, selon la compatibilité des matières, des filières et des horaires."
    image = "../static/images/mentoring-icon.png"></page-block>

    <page-block titre = "Comment ça marche ?"
    texte = "1. Créez votre profil
            Renseignez vos compétences, vos matières difficiles, votre filière et vos disponibilités.
            2. Trouvez votre correspondance
            L'algorithme de matching vous propose les profils les plus compatibles avec le vôtre.
            3. Démarrez le mentorat
            Échangez directement via la messagerie intégrée et organisez vos sessions de travail."
    image = "../static/images/mentoring-icon2.png"></page-block>

    <page-block titre = "Avantages"
    texte = "Travailler avec un étudiant qui maîtrise déjà la matière vous fait gagner du temps. Vous ciblez directement vos lacunes au lieu de tâtonner seul. Vous progressez plus vite.
            La plateforme analyse vos matières, votre filière et vos horaires pour vous proposer les profils les plus compatibles. Vous n'avez pas à chercher manuellement. Vous trouvez directement.
            Si vous êtes mentor, vous renforcez vos connaissances en les transmettant. Prise de contact, planification et suivi des sessions se font sur la plateforme. Pas besoin d'autres outils."
    image = "../static/images/graduation.png"></page-block>

    <div style="align-self: center;">
        <button class="orange-button" style="margin-bottom: 40px;"><a href="gestion_comptes/inscription.html">Je m'inscris !</a></button>
    </div>

    <page-footer></page-footer>
</body>
</html>
