{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supprimer – IFRI MentorLink</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="inscription-block">
        <h1>Supprimer cette proposition ?</h1>
        <p>{{ proposal.get_type_display }} – {{ proposal.matiere }}</p>
        <p>par {{ proposal.auteur.get_full_name }}</p>
        <form method="POST">
            {% csrf_token %}
            <button class="blue-button" style="background-color:red;">Confirmer la suppression</button>
        </form>
        <a href="{% url 'liste_proposals' %}">Annuler</a>
    </div>
</body>
</html>
