<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" type="module"></script>
    <title>Publier une offre ou une demande</title>

    <link rel="stylesheet" href="formulaire.css">
</head>

<body>

    <div class="inscription-block" id="creation-block">

        <h1 style="align-self: center;">Publier une offre ou une demande</h1>

        <form method="POST" id="formulaire-offre-demande">

            <fieldset>
                <legend>Type de publication</legend>

                <div class="choice-section">
                    <label for="type-offre">Offre de mentorat</label>
                    <input type="radio" name="type" id="type-offre" value="OFFRE" style="margin-left: 38px;" required>
                </div>

                <div class="choice-section">
                    <label for="type-demande">Demande de mentorat</label>
                    <input type="radio" name="type" id="type-demande" value="DEMANDE" required>
                </div>

            </fieldset>

            <label for="creation-subject">Sujet</label>
            <select name="creation-subject" id="creation-subject">
                <option value="Algo">Algo</option>
                <option value="Algo">Algo</option>
                <option value="Algo">Algo</option>
                <option value="Algo">Algo</option>
            </select>

            <label for="creation-description">Description</label>
            <textarea name="creation-description" id="creation-description" rows="5" maxlength="1000" placeholder="Expliquez précisement vos objectifs, vos attentes et/ou vos compétences..." required></textarea>

            <label for="date-debut">Date de début</label>
            <input type="datetime-local" name="date-debut" id="date-debut" required>

            <label for="date-fin">Date de fin</label>
            <input type="datetime-local" name="date-fin" id="date-fin" required>

            <fieldset>
                <legend>Modalité</legend>

                <label for="modalite-presentiel">Présentiel</label>
                <input type="radio" name="modalite" id="modalite-presentiel" value="PRESENTIEL" required>

                <label for="modalite-distanciel">Distanciel</label>
                <input type="radio" name="modalite" id="modalite-distanciel" value="DISTANCIEL" required>

                <label for="modalite-hybride">Hybride</label>
                <input type="radio" name="modalite" id="hybride" value="HYBRIDE" required>
            </fieldset>

            <button type="submit" class="blue-button" id="creation-publication-button">Publier</button>

        </form>

    </div>

</body>

</html>
