<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../static/style.css">
    <script src="../../static/script.js" type="module"></script>
    <title>Inscription</title>
</head>
<body>
    <div class="inscription-block">
        <div style="align-self: center; display: flex; flex-direction: column; align-items: center; color: var(--bleu);">
            <h1 id="inscription-text">Inscription</h1>
            <div class="stick"></div>
        </div>
        <form action="#" id="inscription-form">

            <label for="nom">Votre nom</label>
            <input type="text" id="nom" name="nom" required>

            <label for="prenom">Votre prénom</label>
            <input type="text" id="prenom" name="prenom" required>

            <fieldset>
                <legend>Votre sexe</legend>
                    <div class="sexe-choice-section">
                    <label for="homme">Homme</label>
                    <input type="radio" id="homme" name="sexe" value="Homme" required>
                </div>
                <div class="sexe-choice-section">
                    <label for="femme">Femme</label>
                    <input type="radio" id="femme" name="sexe" value="Femme" required>
                </div>
                <div class="sexe-choice-section">
                    <label for="autre-sexe">Autres</label>
                    <input type="radio" id="autre-sexe" name="sexe" value="Autres" required>
                </div>
            </fieldset>

            <label for="mail">Votre adresse email</label>
            <input type="email" id="mail" name="email" placeholder="monemail@gmail.com" required>

            <label for="phone">Numéro de téléphone</label>
            <input type="tel" id="phone" name="telephone" placeholder="0149494949" pattern="[0-9]{10}" required>

            <div id="password-submission">
                <label for="pwd">Mot de passe</label>
                <input type="password" id="pwd" name="mot_de_passe" required>

                <label for="confirm-pwd">Confirmez votre mot de passe</label>
                <input type="password" id="confirm-pwd" name="confirmation_mot_de_passe" required>
            </div>

            <button class="blue-button">S'inscrire</button>
        </form>
    </div>
</body>
</html>
